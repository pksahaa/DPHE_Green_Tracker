<script>
    let APPS_SCRIPT_URL = localStorage.getItem('dphe_script_url') || "https://script.google.com/macros/s/AKfycbyv96ByiqK0XrwdPlmdd4kn4jQFJ3quWIhRq_2wjMo6uBn16yo95WNFDkxlagp_YxrZ/exec";

    let geoDb = JSON.parse(localStorage.getItem('dphe_geo_db')) || {
        "রংপুর": {
            "রংপুর": {
                "পীরগাছা": { "unions": ["কৈকুড়ী", "কান্দিশ্বড়"], "target": 500 }
            }
        }
    };

    let treeInventory = JSON.parse(localStorage.getItem('dphe_tree_inv')) || [
        { name: "আম (Mango)", type: "Fruit" },
        { name: "মেহগনি (Mehgani)", type: "Timber" }
    ];

    let db = JSON.parse(localStorage.getItem('dphe_master_db')) || [];

    let chartInstanceType = null;
    let chartInstanceLocation = null;
    let chartInstanceTrend = null;
    let leafletMap = null;
    let mapMarkers = [];

    // ── WINDOW ONLOAD ──
    window.onload = function() {
        try {
            document.getElementById('appsScriptUrl').value = APPS_SCRIPT_URL;
            document.getElementById('plantDate').valueAsDate = new Date();
            
            initCascadingDropdowns();
            initDashboardDropdowns(); // এই ফাংশনটি নিচে ডিফাইন করা আছে
            initAuditDropdowns();
            initReportDropdowns();
            
            updateDashboard();
            renderTreeInventorySettings();
            
            if (APPS_SCRIPT_URL) {
                testSheetConnection();
                syncFromSheets();
            } else {
                hideLoader();
                updateSheetStatusLabel("⚙️ Sheet: Not Configured", "text-amber-400");
            }
        } catch (e) {
            console.error("Error during onload init:", e);
            hideLoader(); // কোনো কারণে এরর আসলেও যেন লোডার স্ক্রিন আটকে না থাকে
        }
    };

    function showLoader() { document.getElementById('loader').style.display = 'flex'; }
    function hideLoader() { document.getElementById('loader').style.display = 'none'; }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('collapsed');
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.mob-btn').forEach(el => el.classList.remove('active'));

        document.getElementById('tab-' + tabId).classList.add('active');
        const btn = document.getElementById('btn-' + tabId);
        if (btn) btn.classList.add('active');
        const mobBtn = document.getElementById('mob-' + tabId);
        if (mobBtn) mobBtn.classList.add('active');

        if (tabId === 'dashboard') updateDashboard();
        if (tabId === 'map') setTimeout(initMap, 200);
        if (tabId === 'monitoring') renderMonitoringTable(false);
        if (tabId === 'report') renderReport();
    }

    function updateSheetStatusLabel(text, colorClass) {
        const el = document.getElementById('sheetStatus');
        if (el) {
            el.innerText = text;
            el.className = `logo-text text-[10px] text-center ${colorClass}`;
        }
    }

    function saveAppsScriptUrl() {
        const url = document.getElementById('appsScriptUrl').value.trim();
        localStorage.setItem('dphe_script_url', url);
        APPS_SCRIPT_URL = url;
        testSheetConnection();
    }

    function testSheetConnection() {
        if (!APPS_SCRIPT_URL) return;
        const statusEl = document.getElementById('sheetConnectStatus');
        statusEl.innerText = "সংযোগ পরীক্ষা করা হচ্ছে...";
        statusEl.className = "text-xs font-bold text-gray-500";
        
        jsonpCall(APPS_SCRIPT_URL + "?action=ping")
            .then(res => {
                if (res && res.success) {
                    statusEl.innerText = "🟢 সফলভাবে সংযুক্ত!";
                    statusEl.className = "text-xs font-bold text-green-600";
                    updateSheetStatusLabel("🟢 Sheet: Connected", "text-emerald-400");
                }
            })
            .catch(err => {
                statusEl.innerText = "🔴 সংযোগ ব্যর্থ! URL বা CORS চেক করুন।";
                statusEl.className = "text-xs font-bold text-red-600";
                updateSheetStatusLabel("🔴 Sheet: Connection Error", "text-red-400");
            });
    }

    function jsonpCall(url) {
        return new Promise((resolve, reject) => {
            const callbackName = 'jsonp_' + Math.round(100000 * Math.random());
            const script = document.createElement('script');
            
            const timeoutId = setTimeout(() => {
                cleanUp();
                reject(new Error("Timeout"));
            }, 15000);

            window[callbackName] = function(data) {
                clearTimeout(timeoutId);
                cleanUp();
                resolve(data);
            };

            function cleanUp() {
                if (script.parentNode) script.parentNode.removeChild(script);
                delete window[callbackName];
            }

            script.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + 'callback=' + callbackName;
            script.onerror = () => {
                clearTimeout(timeoutId);
                cleanUp();
                reject(new Error("Script load error"));
            };
            document.body.appendChild(script);
        });
    }

    function syncFromSheets() {
        if (!APPS_SCRIPT_URL) return;
        showLoader();
        jsonpCall(APPS_SCRIPT_URL + "?action=getAll")
            .then(res => {
                if (res.success) {
                    if (res.geoDb && Object.keys(res.geoDb).length > 0) {
                        geoDb = res.geoDb;
                        localStorage.setItem('dphe_geo_db', JSON.stringify(geoDb));
                    }
                    if (res.treeInv && res.treeInv.length > 0) {
                        treeInventory = res.treeInv;
                        localStorage.setItem('dphe_tree_inv', JSON.stringify(treeInventory));
                    }
                    db = res.masterDb || [];
                    localStorage.setItem('dphe_master_db', JSON.stringify(db));
                    
                    initCascadingDropdowns();
                    initDashboardDropdowns();
                    initAuditDropdowns();
                    initReportDropdowns();
                    updateDashboard();
                    renderTreeInventorySettings();
                    showSyncToast("☁️ ডাটা ক্লাউড থেকে সিঙ্ক হয়েছে", "bg-emerald-600");
                }
                hideLoader();
            })
            .catch(err => {
                console.error(err);
                hideLoader();
                showSyncToast("⚠️ অফলাইন মোডে ডাটা লোড হয়েছে", "bg-amber-600");
            });
    }

    function saveToSheets(isSilent = false) {
        if (!APPS_SCRIPT_URL) return;
        if (!isSilent) showLoader();

        const chunks = [];
        const chunkSize = 40;
        for (let i = 0; i < db.length; i += chunkSize) {
            chunks.push(db.slice(i, i + chunkSize));
        }
        const total = chunks.length || 1;

        if (chunks.length === 0) {
            sendChunk(0, 1, "[]", "skip", "skip", isSilent);
            return;
        }

        let p = Promise.resolve();
        chunks.forEach((chunkRows, idx) => {
            p = p.then(() => {
                const masterStr = JSON.stringify(chunkRows);
                const geoParam = (idx === 0) ? JSON.stringify(geoDb) : "skip";
                const treeParam = (idx === 0) ? JSON.stringify(treeInventory) : "skip";
                return sendChunk(idx, total, masterStr, geoParam, treeParam, isSilent);
            });
        });
    }

    function sendChunk(chunk, total, masterStr, geoParam, treeParam, isSilent) {
        let url = APPS_SCRIPT_URL + "?action=saveChunk" +
            "&chunk=" + chunk +
            "&total=" + total +
            "&geoDb=" + encodeURIComponent(geoParam) +
            "&treeInv=" + encodeURIComponent(treeParam) +
            "&masterChunk=" + encodeURIComponent(masterStr);

        return jsonpCall(url).then(res => {
            if (res && res.success && chunk === total - 1) {
                if (!isSilent) {
                    hideLoader();
                    showSyncToast("✅ সমস্ত ডাটা ক্লাউডে সংরক্ষিত!", "bg-emerald-600");
                }
            }
        }).catch(err => {
            console.error("Chunk save failed:", err);
            if (!isSilent) hideLoader();
        });
    }

    function showSyncToast(msg, bgClass) {
        const badge = document.getElementById('syncBadge');
        if (!badge) return;
        badge.innerText = msg;
        badge.className = `show text-white text-xs px-4 py-2 rounded-lg shadow-lg font-bold ${bgClass}`;
        setTimeout(() => badge.classList.remove('show'), 3500);
    }

    // ── DROPDOWNS CASCADE ───────────────────────────────
    function initCascadingDropdowns() {
        const div = document.getElementById('entryDiv');
        const dist = document.getElementById('entryDist');
        const upo = document.getElementById('entryUpo');
        const uni = document.getElementById('entryUni');
        const treeSel = document.getElementById('treeSelect');

        if(!div) return;

        div.innerHTML = '<option value="">বিভাগ বাছুন</option>';
        Object.keys(geoDb).forEach(d => div.innerHTML += `<option value="${d}">${d}</option>`);

        treeSel.innerHTML = '<option value="">গাছ নির্বাচন করুন</option>';
        treeInventory.forEach(t => treeSel.innerHTML += `<option value="${t.name}">${t.name} [${t.type}]</option>`);

        div.onchange = () => {
            dist.innerHTML = '<option value="">জেলা বাছুন</option>';
            upo.innerHTML = '<option value="">আগে জেলা বাছুন</option>';
            uni.innerHTML = '<option value="">আগে উপজেলা বাছুন</option>';
            dist.disabled = !div.value; upo.disabled = true; uni.disabled = true;
            if (div.value && geoDb[div.value]) {
                Object.keys(geoDb[div.value]).forEach(d => dist.innerHTML += `<option value="${d}">${d}</option>`);
            }
        };

        dist.onchange = () => {
            upo.innerHTML = '<option value="">উপজেলা বাছুন</option>';
            uni.innerHTML = '<option value="">আগে উপজেলা বাছুন</option>';
            upo.disabled = !dist.value; uni.disabled = true;
            if (dist.value && geoDb[div.value][dist.value]) {
                Object.keys(geoDb[div.value][dist.value]).forEach(u => upo.innerHTML += `<option value="${u}">${u}</option>`);
            }
        };

        upo.onchange = () => {
            uni.innerHTML = '<option value="">ইউনিয়ন বাছুন</option>';
            uni.disabled = !upo.value;
            if (upo.value && geoDb[div.value][dist.value][upo.value]) {
                geoDb[div.value][dist.value][upo.value].unions.forEach(un => {
                    uni.innerHTML += `<option value="${un}">${un}</option>`;
                });
            }
        };
    }

    // ── [FIXED/ADDED] initDashboardDropdowns FUNCTION ──
    function initDashboardDropdowns() {
        const div = document.getElementById('dashDivision');
        if(!div) return;
        div.innerHTML = '';
        Object.keys(geoDb).forEach(d => div.innerHTML += `<option value="${d}">${d}</option>`);
        handleDashTierChange();
    }

    function handleDashTierChange() {
        const tier = document.getElementById('dashTier').value;
        const div = document.getElementById('dashDivision');
        const dist = document.getElementById('dashDistrict');

        if (tier === 'Country') {
            div.classList.add('hidden'); dist.classList.add('hidden');
        } else if (tier === 'Division') {
            div.classList.remove('hidden'); dist.classList.add('hidden');
            syncDashDist();
        } else {
            div.classList.remove('hidden'); dist.classList.remove('hidden');
            syncDashDist();
        }
        updateDashboard();
    }

    function syncDashDist() {
        const sDiv = document.getElementById('dashDivision').value;
        const dist = document.getElementById('dashDistrict');
        dist.innerHTML = '';
        if (sDiv && geoDb[sDiv]) {
            Object.keys(geoDb[sDiv]).forEach(d => dist.innerHTML += `<option value="${d}">${d}</option>`);
        }
    }

    // Event listener mapping safely
    const dashDivEl = document.getElementById('dashDivision');
    if(dashDivEl) {
        dashDivEl.onchange = function() {
            syncDashDist();
            updateDashboard();
        };
    }

    function initAuditDropdowns() {
        const div = document.getElementById('auditDiv');
        if(!div) return;
        div.innerHTML = '<option value="">সকল বিভাগ</option>';
        Object.keys(geoDb).forEach(d => div.innerHTML += `<option value="${d}">${d}</option>`);
        
        div.onchange = function() {
            const dist = document.getElementById('auditDist');
            const upo = document.getElementById('auditUpo');
            dist.innerHTML = '<option value="">সকল জেলা</option>';
            upo.innerHTML = '<option value="">সকল উপজেলা</option>';
            if (this.value && geoDb[this.value]) {
                Object.keys(geoDb[this.value]).forEach(d => dist.innerHTML += `<option value="${d}">${d}</option>`);
            }
        };
    }

    function initReportDropdowns() {
        const div = document.getElementById('repDiv');
        if(!div) return;
        div.innerHTML = '<option value="">সব বিভাগ</option>';
        Object.keys(geoDb).forEach(d => div.innerHTML += `<option value="${d}">${d}</option>`);
    }

    function syncReportDropdowns() {
        const sDiv = document.getElementById('repDiv').value;
        const dist = document.getElementById('repDist');
        const upo = document.getElementById('repUpo');
        dist.innerHTML = '<option value="">সব জেলা</option>';
        upo.innerHTML = '<option value="">সব উপজেলা</option>';
        if (sDiv && geoDb[sDiv]) {
            Object.keys(geoDb[sDiv]).forEach(d => dist.innerHTML += `<option value="${d}">${d}</option>`);
        }

    // ── DATA ENTRY FORM SUBMIT ───────────────────────────
    const plantFormEl = document.getElementById('plantationForm');
    if(plantFormEl) {
        plantFormEl.onsubmit = function(e) {
            e.preventDefault();
            const rowId = document.getElementById('editRowId').value;
            
            const treeName = document.getElementById('treeSelect').value;
            const matchingTree = treeInventory.find(t => t.name === treeName);
            const treeType = matchingTree ? matchingTree.type : "Fruit";

            const item = {
                id: rowId || "DPHE-" + Math.floor(1000 + Math.random() * 9000),
                division: document.getElementById('entryDiv').value,
                district: document.getElementById('entryDist').value,
                upojela: document.getElementById('entryUpo').value,
                union: document.getElementById('entryUni').value,
                tree: treeName,
                type: treeType,
                date: document.getElementById('plantDate').value,
                lat: parseFloat(document.getElementById('lat').value),
                lng: parseFloat(document.getElementById('lng').value),
                caregiver: document.getElementById('caregiver').value,
                phone: document.getElementById('phone').value,
                driveImgUrl: document.getElementById('entryStoredImg').value || ""
            };

            if (rowId) {
                const idx = db.findIndex(r => r.id === rowId);
                if (idx >= 0) {
                    item.m3 = db[idx].m3 || "Healthy";
                    item.m6 = db[idx].m6 || "Healthy";
                    item.y1 = db[idx].y1 || "Healthy";
                    item.y2 = db[idx].y2 || "Healthy";
                    item.y3 = db[idx].y3 || "Healthy";
                    item.y5 = db[idx].y5 || "Healthy";
                    db[idx] = item;
                }
            } else {
                item.m3 = "Healthy"; item.m6 = "Healthy"; item.y1 = "Healthy";
                item.y2 = "Healthy"; item.y3 = "Healthy"; item.y5 = "Healthy";
                db.push(item);
            }

            localStorage.setItem('dphe_master_db', JSON.stringify(db));
            clearForm();
            showSyncToast("💾 লোকাল ডাটাবেজে সংরক্ষিত হয়েছে", "bg-emerald-600");
            saveToSheets(true);
        };
    }

    function clearForm() {
        const form = document.getElementById('plantationForm');
        if(!form) return;
        form.reset();
        document.getElementById('editRowId').value = '';
        document.getElementById('entryStoredImg').value = '';
        document.getElementById('imgPreview').classList.add('hidden');
        document.getElementById('imgPlaceholder').classList.remove('hidden');
        document.getElementById('formSubmitBtn').innerText = '💾 ডাটা সেভ করুন';
        document.getElementById('cancelEditBtn').classList.add('hidden');
        document.getElementById('plantDate').valueAsDate = new Date();
        initCascadingDropdowns();
    }

    // ── GPS TRACKING ────────────────────────────────────
    function fetchGPS(latId, lngId) {
        if (!navigator.geolocation) return alert("Geolocation নট সাপোর্টেড!");
        navigator.geolocation.getCurrentPosition(pos => {
            document.getElementById(latId).value = pos.coords.latitude.toFixed(6);
            document.getElementById(lngId).value = pos.coords.longitude.toFixed(6);
        }, err => alert("GPS সিগন্যাল পাওয়া যায়নি: " + err.message), { enableHighAccuracy: true });
    }

    // ── IMAGE CHUNKING & UPLOAD ─────────────────────────
    function handleImageSelect(inputEl) {
        const file = inputEl.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = function(e) {
            const img = new Image();
            img.src = e.target.result;
            img.onload = function() {
                const canvas = document.createElement('canvas');
                let w = img.width, h = img.height;
                if (w > 1200) { h = h * 1200 / w; w = 1200; }
                canvas.width = w; canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, w, h);

                const compressedBase64 = canvas.toDataURL('image/jpeg', 0.75);
                document.getElementById('imgPreview').src = compressedBase64;
                document.getElementById('imgPreview').classList.remove('hidden');
                document.getElementById('imgPlaceholder').classList.add('hidden');

                if (APPS_SCRIPT_URL) {
                    uploadImageInChunks(compressedBase64.split(',')[1], file.name || "tree.jpg");
                }
            };
        };
    }

    function uploadImageInChunks(base64Data, filename) {
        const size = 35000;
        const chunks = [];
        for (let i = 0; i < base64Data.length; i += size) {
            chunks.push(base64Data.slice(i, i + size));
        }
        const total = chunks.length;
        showLoader();

        let p = Promise.resolve();
        chunks.forEach((chunkData, index) => {
            p = p.then(() => {
                const url = APPS_SCRIPT_URL + "?action=imgChunk" +
                    "&chunk=" + index +
                    "&total=" + total +
                    "&filename=" + encodeURIComponent(filename) +
                    "&data=" + encodeURIComponent(chunkData);
                return jsonpCall(url);
            });
        });

        p.then(() => {
            return jsonpCall(APPS_SCRIPT_URL + "?action=imgFinalize");
        }).then(res => {
            hideLoader();
            if (res && res.success) {
                document.getElementById('entryStoredImg').value = res.url;
                showSyncToast("📸 ছবি ড্রাইভে আপলোড সফল!", "bg-emerald-600");
            } else {
                alert("চিত্র একত্রীকরণ ব্যর্থ: " + (res.error || "Unknown"));
            }
        }).catch(err => {
            hideLoader();
            console.error(err);
            alert("ছবি আপলোড এরর: " + err.message);
        });
    }

    // ── DASHBOARD MATH ENGINE ────────────────────────────
    function getTreeStatus(row) {
        if (row.m5 === 'Dead' || row.y3 === 'Dead' || row.y2 === 'Dead' || row.y1 === 'Dead' || row.m6 === 'Dead' || row.m3 === 'Dead') return 'Dead';
        if (row.m5 === 'NeedsCare' || row.y3 === 'NeedsCare' || row.y2 === 'NeedsCare' || row.y1 === 'NeedsCare' || row.m6 === 'NeedsCare' || row.m3 === 'NeedsCare') return 'NeedsCare';
        return 'Healthy';
    }

    function updateDashboard() {
        const tierEl = document.getElementById('dashTier');
        if(!tierEl) return;
        const tier = tierEl.value;
        const sDiv = document.getElementById('dashDivision').value;
        const sDist = document.getElementById('dashDistrict').value;

        let pool = [...db];
        if (tier === 'Division') pool = pool.filter(r => r.division === sDiv);
        if (tier === 'District') pool = pool.filter(r => r.division === sDiv && r.district === sDist);

        let target = 0;
        Object.keys(geoDb).forEach(dv => Object.keys(geoDb[dv]).forEach(ds => Object.keys(geoDb[dv][ds]).forEach(up => {
            const ok = (tier === 'Country') || (tier === 'Division' && dv === sDiv) || (tier === 'District' && dv === sDiv && ds === sDist);
            if (ok) target += geoDb[dv][ds][up].target;
        })));

        const dead = pool.filter(r => getTreeStatus(r) === 'Dead').length;
        const survivalRate = pool.length > 0 ? (((pool.length - dead) / pool.length) * 100).toFixed(1) : 0;
        const progressPct = target > 0 ? Math.min(((pool.length / target) * 100), 100).toFixed(1) : 0;

        document.getElementById('kpi-target').innerText = target;
        document.getElementById('kpi-target2').innerText = target;
        document.getElementById('kpi-planted').innerText = pool.length;
        document.getElementById('kpi-planted2').innerText = pool.length;
        document.getElementById('kpi-survival').innerText = survivalRate + "%";
        document.getElementById('kpi-dead').innerText = dead;
        document.getElementById('progressPct').innerText = progressPct + "%";
        document.getElementById('progressBar').style.width = progressPct + "%";

        renderDashboardCharts(pool, tier, sDiv);
        checkReminders();
    }

    function checkReminders() {
        let count = 0;
        const dueList = document.getElementById('dueList');
        if(!dueList) return;
        dueList.innerHTML = '';

        db.forEach(r => {
            const plantTime = new Date(r.date).getTime();
            const ageMonths = (Date.now() - plantTime) / (1000 * 60 * 60 * 24 * 30.4);
            let missing = [];

            if (ageMonths >= 3 && !r.m3) missing.push("৩-মাস");
            if (ageMonths >= 6 && !r.m6) missing.push("৬-মাস");
            if (ageMonths >= 12 && !r.y1) missing.push("১-বছর");
            if (ageMonths >= 24 && !r.y2) missing.push("২-বছর");
            if (ageMonths >= 36 && !r.y3) missing.push("৩-বছর");
            if (ageMonths >= 60 && !r.y5) missing.push("৫-বছর");

            if (missing.length > 0 && getTreeStatus(r) !== 'Dead') {
                count++;
                dueList.innerHTML += `<div class="p-2 bg-red-50 border border-red-100 rounded-lg flex justify-between items-center">
                    <div><strong>${r.id}</strong> (${r.tree}) - ${r.union}, ${r.upojela} <span class="text-red-500 font-bold">[Pending: ${missing.join(', ')}]</span></div>
                    <button onclick="editTreeAudit('${r.id}')" class="px-2 py-1 bg-red-600 text-white rounded font-bold text-[10px]">Audit</button>
                </div>`;
            }
        });

        const btn = document.getElementById('reminderBtn');
        const countEl = document.getElementById('reminderCount');
        if (count > 0) {
            if(btn) btn.classList.remove('hidden');
            if(countEl) countEl.innerText = count;
        } else {
            if(btn) btn.classList.add('hidden');
            dueList.innerHTML = `<p class="text-gray-400 italic">কোনো pending followup নেই।</p>`;
        }
    }

    // ── CHARTS RENDERING ENGINE ─────────────────────────
    function renderDashboardCharts(pool, tier, sDiv) {
        const types = {};
        pool.forEach(r => types[r.type] = (types[r.type] || 0) + 1);
        
        if (chartInstanceType) chartInstanceType.destroy();
        const ctxPie = document.getElementById('chartType').getContext('2d');
        chartInstanceType = new Chart(ctxPie, {
            type: 'pie',
            data: {
                labels: Object.keys(types),
                datasets: [{ data: Object.values(types), backgroundColor: ['#10b981', '#3b82f6', '#f59e0b', '#ec4899'] }]
            },
            options: { plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } } }
        });

        const barLabels = [];
        const barData = [];
        if (tier === 'Country') {
            Object.keys(geoDb).forEach(dv => {
                barLabels.push(dv);
                barData.push(pool.filter(r => r.division === dv).length);
            });
        } else {
            const divTarget = geoDb[sDiv] || {};
            Object.keys(divTarget).forEach(ds => {
                barLabels.push(ds);
                barData.push(pool.filter(r => r.district === ds).length);
            });
        }

        if (chartInstanceLocation) chartInstanceLocation.destroy();
        const ctxBar = document.getElementById('chartLocation').getContext('2d');
        chartInstanceLocation = new Chart(ctxBar, {
            type: 'bar',
            data: {
                labels: barLabels,
                datasets: [{ label: 'রোপণকৃত গাছ', data: barData, backgroundColor: '#059669' }]
            },
            options: { scales: { y: { beginAtZero: true } }, plugins: { legend: { display: false } } }
        });

        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        const trendCounts = Array(12).fill(0);
        pool.forEach(r => {
            if (r.date) {
                const m = new Date(r.date).getMonth();
                trendCounts[m]++;
            }
        });

        if (chartInstanceTrend) chartInstanceTrend.destroy();
        const ctxTrend = document.getElementById('chartTrend').getContext('2d');
        chartInstanceTrend = new Chart(ctxTrend, {
            type: 'line',
            data: {
                labels: months,
                datasets: [{ label: 'মাসিক রোপণ সংখ্যা', data: trendCounts, borderColor: '#10b981', tension: 0.2, fill: true, backgroundColor: 'rgba(16,185,129,0.1)' }]
            },
            options: { plugins: { legend: { display: false } } }
        });
    }

    // ── MONITORING TABLE & AUDITING ─────────────────────
    function clearMonitoringSearch() {
        document.getElementById('searchLat').value = '';
        document.getElementById('searchLng').value = '';
        renderMonitoringTable(false);
    }

    function renderMonitoringTable(useRadius) {
        const tbody = document.getElementById('monitoringBody');
        if (!tbody) return;
        tbody.innerHTML = '';

        let pool = [...db];

        if (useRadius) {
            const sLat = parseFloat(document.getElementById('searchLat').value);
            const sLng = parseFloat(document.getElementById('searchLng').value);
            const rad = parseFloat(document.getElementById('searchRadius').value) || 500;
            if (!isNaN(sLat) && !isNaN(sLng)) {
                pool = pool.filter(r => {
                    const d = calculateDistance(sLat, sLng, r.lat, r.lng);
                    return d <= rad;
                });
            }
        } else {
            const fDiv = document.getElementById('auditDiv').value;
            const fDist = document.getElementById('auditDist').value;
            const fUpo = document.getElementById('auditUpo').value;

            if (fDiv) pool = pool.filter(r => r.division === fDiv);
            if (fDist) pool = pool.filter(r => r.district === fDist);
            if (fUpo) pool = pool.filter(r => r.upojela === fUpo);
        }

        pool.forEach(row => {
            const imgEl = row.driveImgUrl ? `<img src="${row.driveImgUrl}" class="img-preview" onclick="viewPopupImg('${row.driveImgUrl}')">` : `<span class="text-gray-300 italic text-[11px]">No Img</span>`;
            
            tbody.innerHTML += `<tr>
                <td class="p-3">
                    <div class="font-black text-gray-800">${row.id}</div>
                    <div class="text-[11px] text-gray-500">${row.tree} [${row.type}]</div>
                </td>
                <td class="p-3">
                    <div class="text-[11px] font-semibold">${row.division} › ${row.district} › ${row.upojela}</div>
                    <div class="text-gray-400 text-[10px]">${row.union} | ${row.date}</div>
                </td>
                <td class="p-3 text-center">${imgEl}</td>
                <td class="p-2">${createAuditSelect(row.id, 'm3', row.m3)}</td>
                <td class="p-2">${createAuditSelect(row.id, 'm6', row.m6)}</td>
                <td class="p-2">${createAuditSelect(row.id, 'y1', row.y1)}</td>
                <td class="p-2">${createAuditSelect(row.id, 'y2', row.y2)}</td>
                <td class="p-2">${createAuditSelect(row.id, 'y3', row.y3)}</td>
                <td class="p-2">${createAuditSelect(row.id, 'y5', row.y5)}</td>
            </tr>`;
        });
    }

    function createAuditSelect(rowId, phase, val) {
        let color = "bg-green-100 text-green-800";
        if (val === 'NeedsCare') color = "bg-yellow-100 text-yellow-800";
        if (val === 'Dead') color = "bg-red-100 text-red-800";

        return `<select onchange="updateAuditStatus('${rowId}', '${phase}', this.value)" class="${color} font-bold text-[11px]" style="padding:4px; border-radius:6px; width:95px;">
            <option value="Healthy" ${val==='Healthy'?'selected':''}>🟢 সতেজ</option>
            <option value="NeedsCare" ${val==='NeedsCare'?'selected':''}>🟡 যত্ন প্রয়োজন</option>
            <option value="Dead" ${val==='Dead'?'selected':''}>🔴 মৃত/নষ্ট</option>
        </select>`;
    }

    function updateAuditStatus(rowId, phase, newVal) {
        const idx = db.findIndex(r => r.id === rowId);
        if (idx >= 0) {
            db[idx][phase] = newVal;
            localStorage.setItem('dphe_master_db', JSON.stringify(db));
            showSyncToast("🌿 অডিট স্ট্যাটাস আপডেট হয়েছে", "bg-emerald-600");
            saveToSheets(true);
        }
    }

    function editTreeAudit(rowId) {
        switchTab('monitoring');
        const idx = db.findIndex(r => r.id === rowId);
        if (idx >= 0) {
            document.getElementById('auditDiv').value = db[idx].division;
            renderMonitoringTable(false);
        }
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        if (!lat1 || !lon1 || !lat2 || !lon2) return 999999;
        const R = 6371e3;
        const φ1 = lat1 * Math.PI/180;
        const φ2 = lat2 * Math.PI/180;
        const Δφ = (lat2-lat1) * Math.PI/180;
        const Δλ = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function viewPopupImg(url) {
        document.getElementById('imgModalSrc').src = url;
        document.getElementById('imgModal').classList.add('show');
    }

    // ── MAP VISUALIZATION ────────────────────────────────
    function initMap() {
        const mapEl = document.getElementById('treeMap');
        if (!mapEl) return;
        if (!leafletMap) {
            leafletMap = L.map('treeMap').setView([23.685, 90.356], 7);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(leafletMap);
        }
        filterMap('all');
    }

    function filterMap(statusFilter) {
        if (!leafletMap) return;
        mapMarkers.forEach(m => leafletMap.removeLayer(m));
        mapMarkers = [];

        let hCount = 0, cCount = 0, dCount = 0;

        db.forEach(row => {
            if (!row.lat || !row.lng) return;
            const stat = getTreeStatus(row);

            if (stat === 'Healthy') hCount++;
            if (stat === 'NeedsCare') cCount++;
            if (stat === 'Dead') dCount++;

            if (statusFilter !== 'all' && stat !== statusFilter) return;

            let color = '#10b981';
            if (stat === 'NeedsCare') color = '#f59e0b';
            if (stat === 'Dead') color = '#ef4444';

            const marker = L.circleMarker([row.lat, row.lng], {
                radius: 7, fillColor: color, color: '#fff', weight: 1.5, fillOpacity: 0.9
            }).addTo(leafletMap);

            marker.bindPopup(`<b>ID: ${row.id}</b><br>গাছ: ${row.tree}<br>তত্ত্বাবধায়ক: ${row.caregiver}<br>স্ট্যাটাস: ${stat}`);
            mapMarkers.push(marker);
        });

        document.getElementById('mapHealthy').innerText = hCount;
        document.getElementById('mapNeedsCare').innerText = cCount;
        document.getElementById('mapDead').innerText = dCount;
    }

    // ── FIELD MASTER REPORT ──────────────────────────────
    function renderReport() {
        const tbody = document.getElementById('reportBody');
        if (!tbody) return;
        tbody.innerHTML = '';

        const search = document.getElementById('reportSearch').value.toLowerCase();
        const fDiv = document.getElementById('repDiv').value;
        const fDist = document.getElementById('repDist').value;
        const fUpo = document.getElementById('repUpo').value;

        let pool = db.filter(row => {
            const matchTxt = row.id.toLowerCase().includes(search) || row.caregiver.toLowerCase().includes(search) || row.tree.toLowerCase().includes(search);
            const matchDiv = !fDiv || row.division === fDiv;
            const matchDist = !fDist || row.district === fDist;
            const matchUpo = !fUpo || row.upojela === fUpo;
            return matchTxt && matchDiv && matchDist && matchUpo;
        });

        pool.forEach(row => {
            const stat = getTreeStatus(row);
            let badge = `<span class="px-2 py-1 rounded bg-green-100 text-green-800 text-[10px]">🟢 সতেজ</span>`;
            if (stat === 'NeedsCare') badge = `<span class="px-2 py-1 rounded bg-yellow-100 text-yellow-800 text-[10px]">🟡 যত্ন</span>`;
            if (stat === 'Dead') badge = `<span class="px-2 py-1 rounded bg-red-100 text-red-800 text-[10px]">🔴 মৃত</span>`;

            const imgEl = row.driveImgUrl ? `<img src="${row.driveImgUrl}" class="img-preview" onclick="viewPopupImg('${row.driveImgUrl}')">` : `<span class="text-gray-300 italic">No Img</span>`;

            tbody.innerHTML += `<tr>
                <td class="p-3 font-black text-gray-800">${row.id}</td>
                <td class="p-3">
                    <div class="font-semibold">${row.division} › ${row.district} › ${row.upojela}</div>
                    <div class="text-gray-400 text-[10px]">${row.union} | ${row.date}</div>
                </td>
                <td class="p-3 font-bold text-emerald-800">${row.tree}</td>
                <td class="p-3">${imgEl}</td>
                <td class="p-3">${badge}</td>
                <td class="p-3 text-xs">${row.caregiver}<br><span class="text-gray-400">${row.phone}</span></td>
                <td class="p-3 text-center space-x-1 print:hidden">
                    <button onclick="triggerEdit('${row.id}')" class="px-2 py-1 bg-blue-500 text-white rounded font-bold text-[10px]">✏️</button>
                    <button onclick="triggerDelete('${row.id}')" class="px-2 py-1 bg-red-500 text-white rounded font-bold text-[10px]">🗑️</button>
                </td>
            </tr>`;
        });
    }

    function triggerEdit(rowId) {
        const item = db.find(r => r.id === rowId);
        if (!item) return;

        switchTab('entry');
        document.getElementById('editRowId').value = item.id;
        document.getElementById('entryStoredImg').value = item.driveImgUrl;
        
        if(item.driveImgUrl) {
            document.getElementById('imgPreview').src = item.driveImgUrl;
            document.getElementById('imgPreview').classList.remove('hidden');
            document.getElementById('imgPlaceholder').classList.add('hidden');
        }

        document.getElementById('entryDiv').value = item.division;
        document.getElementById('entryDiv').onchange();
        document.getElementById('entryDist').value = item.district;
        document.getElementById('entryDist').onchange();
        document.getElementById('entryUpo').value = item.upojela;
        document.getElementById('entryUpo').onchange();
        document.getElementById('entryUni').value = item.union;
        
        document.getElementById('treeSelect').value = item.tree;
        document.getElementById('plantDate').value = item.date;
        document.getElementById('lat').value = item.lat;
        document.getElementById('lng').value = item.lng;
        document.getElementById('caregiver').value = item.caregiver;
        document.getElementById('phone').value = item.phone;

        document.getElementById('formSubmitBtn').innerText = '🔄 ডাটা আপডেট করুন';
        document.getElementById('cancelEditBtn').classList.remove('hidden');
    }

    function triggerDelete(rowId) {
        if (!confirm("আপনি কি নিশ্চিতভাবে এই ডাটাটি ডিলিট করতে চান?")) return;
        db = db.filter(r => r.id !== rowId);
        localStorage.setItem('dphe_master_db', JSON.stringify(db));
        renderReport();
        saveToSheets(true);
    }

    function exportCSV() {
        let csv = "\uFEFFTree ID,Division,District,Upazila,Union,Tree Name,Type,Date,Latitude,Longitude,Caregiver,Phone,Status\n";
        db.forEach(r => {
            csv += `"${r.id}","${r.division}","${r.district}","${r.upojela}","${r.union}","${r.tree}","${r.type}","${r.date}","${r.lat}","${r.lng}","${r.caregiver}","${r.phone}","${getTreeStatus(r)}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `DPHE_Master_Report_${Date.now()}.csv`;
        a.click();
    }

    function exportPDF() { window.print(); }

    // ── SETTINGS MANAGEMENT ENGINE ───────────────────────
    function renderTreeInventorySettings() {
        const list = document.getElementById('treeList');
        if(!list) return;
        list.innerHTML = '';
        treeInventory.forEach((t, idx) => {
            list.innerHTML += `<li class="py-1.5 flex justify-between items-center">
                <span>🌳 <b>${t.name}</b> (${t.type})</span>
                <button onclick="removeTree(${idx})" class="text-red-500 font-bold hover:underline">Delete</button>
            </li>`;
        });
    }

    function addTree() {
        const name = document.getElementById('newTreeName').value.trim();
        const type = document.getElementById('newTreeType').value;
        if(!name) return alert("গাছের নাম লিখুন!");
        treeInventory.push({ name, type });
        localStorage.setItem('dphe_tree_inv', JSON.stringify(treeInventory));
        document.getElementById('newTreeName').value = '';
        renderTreeInventorySettings();
        initCascadingDropdowns();
        saveToSheets(true);
    }

    function removeTree(idx) {
        treeInventory.splice(idx, 1);
        localStorage.setItem('dphe_tree_inv', JSON.stringify(treeInventory));
        renderTreeInventorySettings();
        initCascadingDropdowns();
        saveToSheets(true);
    }

    function saveLocation() {
        const dv = document.getElementById('setDiv').value.trim();
        const ds = document.getElementById('setDist').value.trim();
        const up = document.getElementById('setUpo').value.trim();
        const un = document.getElementById('setUni').value.trim();
        const tg = parseInt(document.getElementById('setGoal').value) || 0;

        if(!dv || !ds || !up || !un) return alert("লোকেশন এর সকল ফিল্ড পূরণ করুন!");

        if (!geoDb[dv]) geoDb[dv] = {};
        if (!geoDb[dv][ds]) geoDb[dv][ds] = {};
        if (!geoDb[dv][ds][up]) geoDb[dv][ds][up] = { unions: [], target: 0 };
        
        if(!geoDb[dv][ds][up].unions.includes(un)) geoDb[dv][ds][up].unions.push(un);
        geoDb[dv][ds][up].target = tg;

        localStorage.setItem('dphe_geo_db', JSON.stringify(geoDb));
        alert("লোকেশন ও টার্গেট সফলভাবে সংরক্ষিত!");
        initCascadingDropdowns();
        initDashboardDropdowns();
        saveToSheets(true);
    }

    function bulkUpload(type) {
        const fileInput = type === 'location' ? document.getElementById('locFile') : document.getElementById('treeFile');
        const file = fileInput.files[0];
        if (!file) return alert("দয়া করে আগে একটি ফাইল নির্বাচন করুন!");

        const reader = new FileReader();
        reader.readAsText(file, "UTF-8");
        reader.onload = function (e) {
            const text = e.target.result;
            const lines = text.split("\n").map(l => l.trim()).filter(l => l.length > 0);
            
            if(type === 'location') {
                lines.forEach((line, idx) => {
                    if (idx === 0 && line.includes("বিভাগ")) return; 
                    const parts = line.split(",");
                    if (parts.length >= 5) {
                        const [dv, ds, up, un, tg] = parts.map(p => p.trim());
                        if (!geoDb[dv]) geoDb[dv] = {};
                        if (!geoDb[dv][ds]) geoDb[dv][ds] = {};
                        if (!geoDb[dv][ds][up]) geoDb[dv][ds][up] = { unions: [], target: 0 };
                        if (!geoDb[dv][ds][up].unions.includes(un)) geoDb[dv][ds][up].unions.push(un);
                        geoDb[dv][ds][up].target = parseInt(tg) || 0;
                    }
                });
                localStorage.setItem('dphe_geo_db', JSON.stringify(geoDb));
                initDashboardDropdowns();
            } else {
                lines.forEach((line, idx) => {
                    if (idx === 0 && line.includes("ধরণ")) return;
                    const parts = line.split(",");
                    if (parts.length >= 2) {
                        const [name, tType] = parts.map(p => p.trim());
                        if(!treeInventory.some(t => t.name === name)) {
                            treeInventory.push({ name, type: tType });
                        }
                    }
                });
                localStorage.setItem('dphe_tree_inv', JSON.stringify(treeInventory));
                renderTreeInventorySettings();
            }
            initCascadingDropdowns();
            alert("✅ Bulk Upload সফল হয়েছে!");
            saveToSheets(true);
        };
    }

    function downloadTemplate(type) {
        let csv = "\uFEFF", name = "";
        if (type === 'location') {
            csv += "বিভাগ,জেলা,উপজেলা,ইউনিয়ন,লক্ষ্যমাত্রা\nরংপুর,রংপুর,পীরগাছা,কৈকুড়ী,500";
            name = "Location_Template.csv";
        } else {
            csv += "গাছের নাম,ধরণ\nকাঁঠাল (Jackfruit),Fruit\nহিজল (Hijol),Timber";
            name = "Tree_Template.csv";
        }
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = name;
        a.click();
    }

    function clearAllLocalData() {
        if (!confirm("⚠️ আপনি কি নিশ্চিতভাবে সমস্ত লোকাল ক্যাশ মেমোরি ডাটা মুছতে চান?")) return;
        localStorage.clear();
        alert("লোকাল ক্যাশ মেমোরি ডাটা পরিষ্কার করা হয়েছে। পেজটি রিলোড দিন।");
        location.reload();
    }
